name: Build and Deploy Documentation

on:
  push:
    branches:
      - main

# Enable the writes options
permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install System Dependencies for PDF Generation
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3-dev python3-pip python3-setuptools libcairo2 pango1.0-tests weasyprint

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs-material mkdocs-with-pdf tomli

      - name: Generate SCPI Reference Page
        run: |
          python3 scripts/scpi2md.py

      - name: Build and Deploy to GitHub Pages
        run: |
          mkdocs gh-deploy --force
