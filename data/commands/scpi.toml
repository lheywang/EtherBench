["*idn"]
description = "Return the identification string for the device."
args = {}
returns = { "IDN" = "<string>" }
duration = "very fast"
blocking = true
ex_command = "*idn?"
ex_return = "*IDN,EtherBenchv1:[build-date]:[firmware-version]"


["*opc"]
description = "Check for current running commands"
args = { "XX" = "Value" }
returns = { "0" = "OK" }
duration = "very fast"
blocking = true
ex_command = "*OPC,OK"


["*opt"]
description = "Returns the options string of the device. Currently, no options are possibles."
args = {}
returns = { "0" = "OK" }
duration = "very fast"
blocking = true
ex_command = "*opt?"
ex_return = "*OPT,EtherBenchv1:[]"

["*rst"]
description = "Reset the device, equivalent to a power on-off-on cycle."
warning = "Perform an hard reset of the device. Any openned sessions will be *brutally* closed."
args = {}
returns = { "RST" = "OK" }
duration = "slow"
blocking = true
ex_command = "*rst"
ex_return = "*RST,OK]"

["*sre"]
description = "Return the service query status."
note = "This command is implented as a placeholder. Always return false."
args = {}
returns = { "0" = "OK" }
duration = "very fast"
blocking = true
ex_command = "*cls"
ex_return = "*CLS,0"

["*stb"]
description = "Read the status byte register"
note = "This command is implented as a placeholder. Always return 0."
args = {}
returns = { "STB" = "OK" }
duration = "very fast"
blocking = true
ex_command = "*stb?"
ex_return = "*STB,0"

["*tst"]
description = "Perform the self-test of the device. Check that all threads are running."
args = {}
returns = { "TST" = "OK" }
duration = "very fast"
blocking = true
ex_command = "*tst"
ex_return = "*TST,OK"

["*wai"]
description = "Wait for all IO to be executed."
args = {}
returns = { "WAI" = "OK" }
duration = "slow"
blocking = true
ex_command = "*wai"
ex_return = "*WAI,OK"
