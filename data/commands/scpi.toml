["*cls"]
description = "Clear all the SCPI exposed registers on the device."
warning = "This does not perform a reset of the device. Hence, statuses may be retained."
args = {}
returns = { "CLS" = "OK" }
duration = "very fast"
blocking = true
ex_command = "*cls"
ex_return = "*CLS,OK"

["*ese"]
description = "Read / Set bits on the Event Status Register. Returns the event status mask."
args = { "XX" = "Bits to be set (if maskable)." }
returns = { "0-255" = "Applied mask", "-1" = "Invalid mask" }
duration = "very fast"
blocking = true
ex_command = "*ese 255"
ex_return = "*ESE,255"
table = { name = "Bit signification", array = [
    [
        "Bit",
        "Name",
        "Signification",
    ],
    [
        "0",
        "OPC",
        "Operation complete",
    ],
    [
        "1",
        "",
        "Unused",
    ],
    [
        "2",
        "QYE",
        "The device could not process a command. Buffers are perhaps full ?",
    ],
    [
        "3",
        "DDE",
        "Self test failed",
    ],
    [
        "4",
        "EXE",
        "A command failed it's execution",
    ],
    [
        "5",
        "CMD",
        "An invalid command was received",
    ],
    [
        "6",
        "",
        "Unused",
    ],
    [
        "7",
        "",
        "Unused",
    ],
] }


["*esr"]
description = "Read the Event Status Register."
args = {}
returns = { "XX" = "255" }
duration = "very fast"
blocking = true
ex_command = "*esr?"
ex_return = "*ESR,25"
table = { name = "Bit signification", array = [
    [
        "Bit",
        "Name",
        "Signification",
    ],
    [
        "0",
